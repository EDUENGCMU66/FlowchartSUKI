<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventFlow</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   TOKENS
═══════════════════════════════════════ */
:root {
  --c0: #0a0a0f;
  --c1: #111118;
  --c2: #1a1a24;
  --c3: #242432;
  --c4: #2e2e40;
  --c5: #3d3d54;
  --c6: #5a5a7a;
  --c7: #8888aa;
  --c8: #b0b0cc;
  --c9: #d8d8e8;
  --cf: #f0f0f8;

  --accent:  #4f6ef7;
  --accent-h:#6b85ff;
  --accent-d:#3a56d4;
  --accent-bg:#4f6ef714;
  --accent-brd:#4f6ef730;

  --green: #22c55e;
  --green-bg:#22c55e14;
  --amber: #f59e0b;
  --amber-bg:#f59e0b14;
  --red:   #ef4444;
  --red-bg:#ef444414;
  --purple:#a855f7;
  --purple-bg:#a855f714;

  --border: #ffffff10;
  --border2:#ffffff18;
  --border3:#ffffff22;

  --radius: 6px;
  --radius-sm: 4px;
  --shadow: 0 1px 3px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.3);
  --shadow-lg: 0 4px 12px rgba(0,0,0,.5), 0 20px 60px rgba(0,0,0,.4);

  --sb-w: 200px;
  --tl-h: 88px;
  --row-h: 72px;
  --col-w: 52px;

  --font: 'IBM Plex Sans Thai', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}
  /* ═══════════════════════════════════════
   THEMES (โหมดสว่าง)
═══════════════════════════════════════ */
body.light-mode {
  --c0: #f4f5f7; /* พื้นหลังสุด */
  --c1: #ffffff; /* แผงเมนูและพื้นหลังหลัก */
  --c2: #f9fafb; /* แถบเครื่องมือ */
  --c3: #e5e7eb; /* เส้นขอบและ hover */
  --c4: #d1d5db; /* ปุ่มที่ถูกเลือก */
  --c5: #9ca3af; /* ตัวหนังสือสีจางสุด */
  --c6: #6b7280; /* ตัวหนังสือรอง */
  --c7: #4b5563; /* ตัวหนังสือหลักจางๆ */
  --c8: #374151; /* ตัวหนังสือหัวข้อ */
  --c9: #1f2937; /* ตัวหนังสือเน้นคำ */
  --cf: #111827; /* ตัวหนังสือสีเข้มสุด (แทนสีขาวเดิม) */

  --border: #e5e7eb;
  --border2: #d1d5db;
  --border3: #9ca3af;

  /* ปรับเงาให้ดูละมุนขึ้นในโหมดสว่าง */
  --shadow: 0 1px 3px rgba(0,0,0,.05), 0 8px 24px rgba(0,0,0,.05);
  --shadow-lg: 0 4px 12px rgba(0,0,0,.08), 0 20px 60px rgba(0,0,0,.08);
}

/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  font-size: 13px;
  background: var(--c0);
  color: var(--cf);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button { font-family: var(--font); cursor: pointer; }
input, select, textarea { font-family: var(--font); }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--c5); border-radius: 2px; }
::selection { background: var(--accent); color: #fff; }

/* ═══════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════ */
#app { display: flex; height: 100vh; }

/* ── Side Nav ── */
#sidenav {
  width: 48px;
  background: var(--c1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 0;
  gap: 2px;
  flex-shrink: 0;
  z-index: 80;
}
.sn-logo {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
  margin-bottom: 14px;
  letter-spacing: -0.5px;
}
.sn-btn {
  width: 36px; height: 36px;
  border: none; background: none; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--c7); font-size: 14px;
  transition: background .12s, color .12s;
  position: relative;
}
.sn-btn:hover, .sn-btn.on { background: var(--c3); color: var(--cf); }
.sn-btn .tt {
  position: absolute; left: 46px;
  background: var(--c3); color: var(--cf);
  font-size: 11px; font-weight: 500;
  padding: 4px 8px; border-radius: 4px;
  white-space: nowrap; border: 1px solid var(--border2);
  opacity: 0; pointer-events: none; transition: opacity .1s;
  z-index: 300;
}
.sn-btn:hover .tt { opacity: 1; }
.sn-sep { width: 24px; height: 1px; background: var(--border); margin: 6px 0; }

/* ── Main ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ── Title Bar ── */
#titlebar {
  height: 44px;
  background: var(--c1);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px; gap: 8px;
  flex-shrink: 0;
}
.ev-selector {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 10px; border-radius: var(--radius);
  cursor: pointer; transition: background .12s;
  border: 1px solid transparent;
}
.ev-selector:hover { background: var(--c3); border-color: var(--border2); }
.ev-name { font-size: 13px; font-weight: 600; color: var(--cf); }
.ev-chevron { color: var(--c7); font-size: 10px; }
.tb-sep { width: 1px; height: 20px; background: var(--border); }
.tb-flex { flex: 1; }

/* ── Tab Bar ── */
#tabbar {
  height: 38px;
  background: var(--c1);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-end;
  padding: 0 16px; gap: 0;
  flex-shrink: 0;
}
.tab-btn {
  height: 36px;
  padding: 0 16px;
  border: none; background: none;
  color: var(--c7); font-size: 12px; font-weight: 500;
  border-bottom: 2px solid transparent;
  transition: color .12s, border-color .12s;
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--c9); }
.tab-btn.on { color: var(--cf); border-bottom-color: var(--accent); }
.tab-count {
  background: var(--c4); color: var(--c8);
  font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: 10px;
}
.tab-btn.on .tab-count { background: var(--accent-bg); color: var(--accent-h); }

/* ── Toolbar ── */
#toolbar {
  height: 40px;
  background: var(--c2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px; gap: 8px;
  flex-shrink: 0;
}
.tbar-group { display: flex; align-items: center; gap: 2px; }
.tbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 6px; }
.tbar-flex { flex: 1; }

/* ── Content ── */
#content {
  flex: 1; display: flex; overflow: hidden; position: relative;
}

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 12px; border: 1px solid var(--border2);
  border-radius: var(--radius); font-size: 12px; font-weight: 500;
  background: var(--c3); color: var(--c9);
  transition: background .12s, border-color .12s, color .12s;
  white-space: nowrap;
}
.btn:hover { background: var(--c4); color: var(--cf); border-color: var(--border3); }
.btn-primary {
  background: var(--accent); color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-h); border-color: var(--accent-h); }
.btn-ghost {
  background: none; border-color: transparent; color: var(--c7);
}
.btn-ghost:hover { background: var(--c3); color: var(--cf); border-color: transparent; }
.btn-danger { background: var(--red-bg); color: var(--red); border-color: var(--red)30; }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-xs { padding: 3px 8px; font-size: 11px; }
.btn-icon {
  width: 28px; height: 28px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
}

/* view toggle */
.seg {
  display: flex; background: var(--c2); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; gap: 0;
}
.seg-btn {
  padding: 4px 12px; border: none; background: none;
  font-size: 11px; font-weight: 500; color: var(--c7);
  transition: background .12s, color .12s;
}
.seg-btn:hover { color: var(--c9); }
.seg-btn.on { background: var(--c4); color: var(--cf); }

/* ═══════════════════════════════════════
   CANVAS VIEW
═══════════════════════════════════════ */
#canvas-view { flex: 1; overflow: hidden; position: relative; background: var(--c0); }

/* subtle dot grid */
#canvas-view::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, var(--c4) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
  opacity: .5;
}

#flowchart { position: absolute; transform-origin: 0 0; cursor: grab; user-select: none; }
#flowchart.grabbing { cursor: grabbing; }

/* sidebar dept */
#dept-col {
  width: var(--sb-w); flex-shrink: 0;
  background: var(--c1); border-right: 1px solid var(--border);
  position: relative; z-index: 10;
}
#dept-col-hd {
  height: var(--tl-h);
  display: flex; align-items: flex-end; padding: 0 14px 10px;
  border-bottom: 1px solid var(--border);
}
.dept-hd-lbl { font-size: 10px; font-weight: 600; color: var(--c6); letter-spacing: .06em; text-transform: uppercase; }

.dept-row {
  height: var(--row-h);
  display: flex; align-items: center;
  padding: 0 14px; gap: 8px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.dept-row:hover { background: var(--c2); }
.dept-color { width: 3px; height: 28px; border-radius: 2px; flex-shrink: 0; }
.dept-name {
  font-size: 12px; font-weight: 500; color: var(--c9);
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  cursor: pointer;
}
.dept-actions { display: none; gap: 2px; }
.dept-row:hover .dept-actions { display: flex; }
.dept-act {
  width: 20px; height: 20px;
  border: 1px solid var(--border); background: var(--c3); border-radius: 3px;
  font-size: 10px; color: var(--c7);
  display: flex; align-items: center; justify-content: center;
}
.dept-act:hover { background: var(--c5); color: var(--cf); }
.dept-add-row {
  height: 36px; display: flex; align-items: center;
  padding: 0 14px; gap: 6px; cursor: pointer;
  color: var(--c6); font-size: 12px; transition: color .12s, background .12s;
}
.dept-add-row:hover { color: var(--cf); background: var(--c2); }

/* timeline header */
#tl-area { flex: 1; overflow: auto; }
#tl-hd {
  height: var(--tl-h);
  display: flex; flex-direction: column;
  border-bottom: 1px solid var(--border);
  background: var(--c1);
  position: sticky; top: 0; z-index: 8;
}
.tl-months { display: flex; height: 44px; align-items: flex-end; border-bottom: 1px solid var(--border); }
.tl-month {
  display: flex; align-items: center;
  padding: 0 10px 6px;
  font-size: 11px; font-weight: 600; color: var(--c7); letter-spacing: .04em;
  border-right: 1px solid var(--border); flex-shrink: 0;
}
.tl-days { display: flex; height: 44px; align-items: center; }
.tl-day {
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--c6); flex-shrink: 0;
  border-right: 1px solid var(--border5, #ffffff08);
  font-variant-numeric: tabular-nums;
}
.tl-day.today {
  background: var(--accent-bg);
  color: var(--accent-h); font-weight: 600;
  border-right: 1px solid var(--accent-brd);
}

/* task rows */
.task-row {
  height: var(--row-h); position: relative;
  border-bottom: 1px solid var(--border);
}
.task-row:hover { background: rgba(255,255,255,.015); }

/* task bars */
.tbar {
  position: absolute; height: 32px; top: 20px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; padding: 0 10px;
  font-size: 11px; font-weight: 500; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  cursor: pointer;
  transition: filter .12s, transform .12s, box-shadow .12s;
  min-width: 32px;
  border: 1px solid transparent;
}
.tbar:hover {
  filter: brightness(1.15);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
  z-index: 10;
}
.tbar.milestone {
  border-radius: 4px;
  background: linear-gradient(90deg, #f59e0b, #f97316) !important;
  color: #fff !important; font-weight: 600;
  border-color: transparent;
  box-shadow: 0 0 0 1px #f59e0b40, 0 4px 12px #f59e0b30;
}
.tbar.milestone::before { content: '◆ '; font-size: 9px; }
.tbar-prog {
  position: absolute; bottom: 0; left: 0;
  height: 2px; background: rgba(255,255,255,.25); border-radius: 0 0 3px 3px;
}
.tbar-done { opacity: .5; }
.tbar-done::after {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(
    -45deg, transparent, transparent 4px,
    rgba(255,255,255,.06) 4px, rgba(255,255,255,.06) 8px
  );
}

/* today line */
.today-line {
  position: absolute; top: 0; bottom: 0; width: 1px;
  background: var(--accent); opacity: .6; z-index: 6; pointer-events: none;
}

/* arrows */
#asvg { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; overflow: visible; }
.dep-path {
  fill: none; stroke: var(--c5); stroke-width: 1.5;
  stroke-dasharray: 4 3; marker-end: url(#dah);
}

/* zoom controls */
#zoom-ctrl {
  position: absolute; bottom: 16px; right: 16px;
  background: var(--c2); border: 1px solid var(--border2);
  border-radius: var(--radius); display: flex; align-items: center;
  overflow: hidden; z-index: 20;
  box-shadow: var(--shadow);
}
.zoom-btn {
  width: 30px; height: 28px; border: none; background: none;
  color: var(--c7); font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: background .12s, color .12s;
}
.zoom-btn:hover { background: var(--c3); color: var(--cf); }
#zoom-val { font-size: 11px; color: var(--c7); font-family: var(--mono); min-width: 40px; text-align: center; }

/* empty canvas */
#canvas-empty {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px;
}
.empty-icon { font-size: 32px; opacity: .3; }
.empty-title { font-size: 14px; font-weight: 500; color: var(--c7); }
.empty-sub { font-size: 12px; color: var(--c6); }

/* ═══════════════════════════════════════
   LIST VIEW
═══════════════════════════════════════ */
#list-view {
  display: none; flex: 1; overflow-y: auto;
  padding: 20px; background: var(--c0);
}
#list-view.show { display: block; }

.lv-header {
  display: grid;
  grid-template-columns: 32px 1fr 140px 100px 180px 80px 90px;
  gap: 0; align-items: center;
  padding: 0 14px; height: 32px;
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: var(--radius) var(--radius) 0 0;
  background: var(--c2);
  font-size: 10px; font-weight: 600;
  color: var(--c6); letter-spacing: .06em; text-transform: uppercase;
}
.lv-body {
  border: 1px solid var(--border);
  border-radius: 0 0 var(--radius) var(--radius);
  overflow: hidden;
  background: var(--c1);
}
.lv-row {
  display: grid;
  grid-template-columns: 32px 1fr 140px 100px 180px 80px 90px;
  gap: 0; align-items: center;
  padding: 0 14px; height: 44px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .1s;
}
.lv-row:last-child { border-bottom: none; }
.lv-row:hover { background: var(--c2); }
.lv-seq {
  font-size: 10px; font-weight: 600; color: var(--c6);
  font-family: var(--mono);
}
.lv-name-cell { display: flex; align-items: center; gap: 7px; overflow: hidden; }
.lv-color-bar { width: 2px; height: 22px; border-radius: 1px; flex-shrink: 0; }
.lv-task-name {
  font-size: 12px; font-weight: 500; color: var(--cf);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lv-dept-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--c7);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lv-dept-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.lv-status-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 600; padding: 2px 7px;
  border-radius: 3px; border: 1px solid;
}
.s-todo   { color: var(--c7);   background: var(--c3);       border-color: var(--border2); }
.s-doing  { color: var(--amber); background: var(--amber-bg); border-color: var(--amber)30; }
.s-done   { color: var(--green); background: var(--green-bg); border-color: var(--green)30; }
.lv-dates { font-size: 10px; color: var(--c7); font-family: var(--mono); }
.lv-prog-wrap { display: flex; align-items: center; gap: 7px; }
.lv-pbar { flex: 1; height: 4px; background: var(--c4); border-radius: 2px; overflow: hidden; }
.lv-pbar-fill { height: 100%; border-radius: 2px; }
.lv-pct { font-size: 10px; color: var(--c6); font-family: var(--mono); width: 28px; }
.lv-actions { display: flex; justify-content: flex-end; gap: 4px; }
.ms-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; color: var(--amber); font-weight: 600;
}
.dday-shift-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 3px;
  border: 1px solid var(--amber)30;
  background: var(--amber-bg); color: var(--amber);
  font-size: 10px; font-weight: 600; font-family: var(--font);
  cursor: pointer; white-space: nowrap; transition: background .12s;
}
.dday-shift-btn:hover { background: var(--amber); color: #000; }
.doff-tag { font-size: 10px; color: var(--c6); font-family: var(--mono); }

/* ═══════════════════════════════════════
   RIGHT PANEL
═══════════════════════════════════════ */
#rpanel {
  width: 0; overflow: hidden;
  background: var(--c1); border-left: 1px solid var(--border);
  transition: width .2s; flex-shrink: 0;
}
#rpanel.open { width: 272px; }
.rp-inner { width: 272px; height: 100%; display: flex; flex-direction: column; }
.rp-head {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 700; color: var(--c8); letter-spacing: .06em; text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
}
.rp-body { flex: 1; overflow-y: auto; padding: 12px; }
.log-entry { padding: 8px 0; border-bottom: 1px solid var(--border); }
.log-entry:last-child { border: none; }
.log-time { font-size: 10px; color: var(--c6); font-family: var(--mono); }
.log-msg { font-size: 12px; color: var(--c8); margin-top: 2px; }
.member-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px; border-radius: var(--radius);
  transition: background .1s; margin-bottom: 2px;
}
.member-row:hover { background: var(--c2); }
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.member-name { font-size: 12px; font-weight: 500; color: var(--c9); }
.role-tag {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  font-weight: 600; margin-top: 1px; display: inline-block;
}
.role-admin  { background: var(--accent-bg); color: var(--accent-h); }
.role-staff  { background: var(--green-bg);  color: var(--green); }
.role-viewer { background: var(--c3);        color: var(--c7); }
.role-chip { padding: 3px 10px; border-radius: 3px; font-size: 11px; font-weight: 600; }

/* ═══════════════════════════════════════
   OVERLAYS & MODALS
═══════════════════════════════════════ */
.ov {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65); backdrop-filter: blur(4px);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .18s;
}
.ov.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--c2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 0;
  width: 480px; max-width: 96vw; max-height: 92vh; overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
  transform: scale(.97) translateY(8px); transition: transform .18s;
}
.ov.open .modal { transform: scale(1) translateY(0); }
.modal-hd {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.modal-title { font-size: 14px; font-weight: 700; color: var(--cf); }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-ft {
  padding: 14px 20px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; justify-content: flex-end;
  flex-shrink: 0; background: var(--c1);
}
.modal-close {
  width: 26px; height: 26px; border: 1px solid var(--border);
  background: var(--c3); border-radius: 4px;
  color: var(--c7); font-size: 12px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { color: var(--cf); background: var(--c4); }

/* form */
.fg { margin-bottom: 14px; }
.fl {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--c7); letter-spacing: .04em; margin-bottom: 5px;
  text-transform: uppercase;
}
.fi {
  width: 100%; padding: 7px 10px;
  background: var(--c1); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--cf); font-size: 12px;
  outline: none; transition: border-color .12s;
}
.fi:focus { border-color: var(--accent); background: var(--c0); }
.fi::placeholder { color: var(--c6); }
.fg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.fcheck { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.fcheck input { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; }
.fcheck span { font-size: 12px; color: var(--c8); }
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* projects panel */
.proj-box {
  background: var(--c2); border: 1px solid var(--border2);
  border-radius: 8px; width: 600px; max-width: 96vw; max-height: 88vh;
  overflow: hidden; display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg); transform: scale(.97) translateY(8px); transition: transform .18s;
}
.ov.open .proj-box { transform: scale(1) translateY(0); }
.proj-hd {
  padding: 18px 20px 14px border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.proj-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px; padding: 16px; overflow-y: auto; flex: 1;
}
.proj-card {
  background: var(--c1); border: 1px solid var(--border);
  border-radius: 6px; padding: 14px; cursor: pointer;
  transition: border-color .12s, background .12s; position: relative;
  min-height: 90px; display: flex; flex-direction: column; gap: 4px;
}
.proj-card:hover { border-color: var(--border3); background: var(--c2); }
.proj-card.on { border-color: var(--accent); background: var(--accent-bg); }
.proj-name { font-size: 12px; font-weight: 600; color: var(--cf); }
.proj-meta { font-size: 10px; color: var(--c6); margin-top: auto; }
.proj-card-actions { position: absolute; top: 8px; right: 8px; display: none; gap: 3px; }
.proj-card:hover .proj-card-actions { display: flex; }
.proj-add {
  border-style: dashed; border-color: var(--c5);
  background: none; color: var(--c6);
  align-items: center; justify-content: center;
  font-size: 12px; gap: 6px;
}
.proj-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.proj-add-icon { font-size: 18px; }

/* confirm / input dialogs */
.sm-box {
  background: var(--c2); border: 1px solid var(--border2);
  border-radius: 8px; width: 360px; max-width: 96vw;
  box-shadow: var(--shadow-lg); overflow: hidden;
  transform: scale(.97) translateY(8px); transition: transform .18s;
}
.ov.open .sm-box { transform: scale(1) translateY(0); }
.sm-hd { padding: 18px 20px 10px; font-size: 14px; font-weight: 700; color: var(--cf); }
.sm-body { padding: 0 20px 14px; font-size: 12px; color: var(--c8); line-height: 1.6; }
.sm-ft {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
  background: var(--c1);
}

/* reschedule */
.rs-box {
  background: var(--c2); border: 1px solid var(--border2);
  border-radius: 8px; width: 580px; max-width: 96vw; max-height: 90vh;
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: var(--shadow-lg); transform: scale(.97) translateY(8px); transition: transform .18s;
}
.ov.open .rs-box { transform: scale(1) translateY(0); }
.rs-anchor {
  padding: 16px 20px; background: var(--c1); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.rs-label { font-size: 10px; font-weight: 700; color: var(--c6); text-transform: uppercase; letter-spacing: .06em; }
.rs-val { font-size: 13px; font-weight: 600; color: var(--cf); }
.rs-date-input {
  background: var(--c0); border: 1px solid var(--border2);
  border-radius: 4px; padding: 5px 10px; font-size: 12px; font-family: var(--mono);
  color: var(--cf); outline: none; transition: border-color .12s;
}
.rs-date-input:focus { border-color: var(--accent); }
.rs-shift-tag {
  padding: 3px 10px; border-radius: 3px; font-size: 11px; font-weight: 700; font-family: var(--mono);
}
.rs-tasks { flex: 1; overflow-y: auto; padding: 12px 16px; }
.rs-tasks-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 4px 10px; margin-bottom: 2px;
  border-bottom: 1px solid var(--border);
}
.rs-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 4px;
  border: 1px solid var(--border); margin-bottom: 4px;
  cursor: pointer; transition: background .1s, border-color .1s;
}
.rs-row:hover { background: var(--c3); }
.rs-row.checked { border-color: var(--accent-brd); background: var(--accent-bg); }
.rs-chk { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
.rs-task-name { flex: 1; font-size: 12px; font-weight: 500; color: var(--cf); }
.rs-task-dept { font-size: 10px; color: var(--c6); }
.rs-old-date { font-size: 10px; color: var(--c6); font-family: var(--mono); white-space: nowrap; }
.rs-new-date { font-size: 10px; color: var(--accent-h); font-family: var(--mono); font-weight: 600; white-space: nowrap; }
.rs-no-change { font-size: 10px; color: var(--c5); }

/* tooltip */
#tt {
  position: fixed; background: var(--c3); border: 1px solid var(--border2);
  border-radius: 6px; padding: 10px 12px; font-size: 11px;
  pointer-events: none; z-index: 9999; opacity: 0; transition: opacity .1s;
  max-width: 220px; box-shadow: var(--shadow); min-width: 160px;
}
#tt.show { opacity: 1; }
.tt-title { font-size: 12px; font-weight: 600; color: var(--cf); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.tt-row { display: flex; gap: 8px; margin-top: 4px; }
.tt-k { color: var(--c7); width: 52px; flex-shrink: 0; }
.tt-v { color: var(--c9); font-weight: 500; }
/* ── ปรับแต่งช่องเลือกวันที่ให้อ่านง่ายขึ้น ── */
input[type="date"].fi {
  font-family: var(--mono); /* ใช้ฟอนต์แบบ Monospace ระยะห่างตัวเลขจะเท่ากันเป๊ะ */
  font-size: 14px; /* ขยายขนาดตัวเลขให้ใหญ่ขึ้น */
  font-weight: 500;
  color: var(--accent-h); /* เปลี่ยนสีตัวเลขเป็นสีฟ้าสว่างให้เด้งออกมา */
  letter-spacing: 0.5px;
  cursor: pointer;
}

/* ปรับสีเมื่อกดโฟกัส (คลิกเลือก) ให้ดูละมุนขึ้น */
input[type="date"].fi:focus {
  background: var(--c2); 
  border-color: var(--accent);
  color: var(--cf); /* เปลี่ยนกลับเป็นสีขาวชั่วคราวตอนกำลังพิมพ์/เลือก */
}

/* ปรับไอคอนปฏิทินด้านขวาให้สว่างขึ้น (แก้ปัญหาไอคอนมืดกลืนไปกับแบล็คกราวด์) */
input[type="date"].fi::-webkit-calendar-picker-indicator {
  filter: invert(1) opacity(0.7); /* พลิกสีไอคอนเป็นสีสว่าง */
  cursor: pointer;
  padding: 4px;
  transition: opacity 0.2s;
}

input[type="date"].fi::-webkit-calendar-picker-indicator:hover {
  opacity: 1; /* สว่างเต็มที่เมื่อเอาเมาส์ไปวาง */
}

/* หากคุณมีการใช้โหมดสว่าง (Light Mode) ให้ใส่บรรทัดนี้เผื่อไว้ด้วย */
body.light-mode input[type="date"].fi::-webkit-calendar-picker-indicator {
  filter: invert(0) opacity(0.6); /* โหมดสว่างปรับไอคอนกลับเป็นสีเข้ม */
} 
  /* ── ป้องกันข้อความโดนตัดสำหรับงานวันเดียว ── */
.tbar.tbar-short {
  overflow: visible !important; /* ยกเลิกการตัดคำ ปล่อยให้ล้นออกมาได้ */
  z-index: 15; /* ดันให้อยู่บนสุดเวลามีงานอื่นอยู่ข้างๆ จะได้ไม่โดนทับ */
  
  /* ใส่เงาให้ตัวหนังสือ เผื่อมันล้นไปทับเส้น Grid แล้วจะอ่านยาก */
  text-shadow: 0 1px 3px rgba(0,0,0,0.8), 0 0 2px rgba(0,0,0,0.6);
}

/* ถ้าใช้คู่กับระบบ Light Mode (โหมดสว่าง) ให้แก้เงาเป็นสีขาวจะได้อ่านง่ายๆ */
body.light-mode .tbar.tbar-short {
  text-shadow: 0 1px 3px rgba(255,255,255,0.9), 0 0 3px rgba(255,255,255,0.9);
}
</style>
</head>

<script>
  // ตรวจสอบธีมเดิมที่เคยเลือกไว้
if (localStorage.getItem('ef_theme') === 'light') {
  document.body.classList.add('light-mode');
}
// ══════════════════════════════════════════════
//  CONSTANTS & STATE + FIREBASE
// ══════════════════════════════════════════════
const DEPT_COLORS=[
  '#4f6ef7','#22c55e','#f59e0b','#ef4444','#a855f7',
  '#06b6d4','#f97316','#ec4899','#84cc16','#14b8a6'

// ฟังก์ชัน Save: บันทึกข้อมูลขึ้น Realtime Database
const save = () => {
  try {
    // บันทึกเฉพาะข้อมูล events และ logs (ไม่ต้องบันทึกพวกพิกัดซูมหน้าจอของแต่ละคน)

    console.error("Firebase Save Error: ", e);

// ฟังก์ชัน Load: ดึงข้อมูลและรอรับการอัปเดตแบบเรียลไทม์
const load = () => {
  try {
    db.ref('eventFlowData').on('value', (snapshot) => {
      const data = snapshot.val();
      
      if (data) {
        // 🔥 ดักปัญหา Firebase ลบ Array ทิ้งด้วย (|| [])
        S.events = (data.events || []).map(ev => ({
          ...ev,
          departments: ev.departments || [],
          tasks: ev.tasks || []
        }));
        S.logs = data.logs || [];
        
        // อัปเดตหน้าจอ
        if (document.getElementById('app')) {
          if (document.getElementById('ov-proj').classList.contains('open')) Proj.render();
          renderAll();
          if (S.tab === 'list') ListView.render();
          if (S.rp === 'log') renderPanel();
        }
      } else {
        // 🔥 กรณีลบข้อมูลทิ้งจนหมดเกลี้ยงฐานข้อมูล
        S.events = [];
        S.logs = [];
        if (document.getElementById('app')) {
          if (document.getElementById('ov-proj').classList.contains('open')) Proj.render();
          renderAll();
          if (S.tab === 'list') ListView.render();
        }
      }
    });
  } catch(e) {
    console.error("Firebase Load Error: ", e);
  }
};

//  CHART RENDER
// ══════════════════════════════════════════════
const CW={month:52,week:38,day:28};
const cw=()=>CW[S.view]||52;
const step=()=>S.view==='month'?7:1;

function buildCols(ev){
  const cols=[];
  let c=new Date(ev.startDate),e=new Date(ev.endDate),st=step();
  while(c<=e){cols.push(new Date(c));c.setDate(c.getDate()+st);}
  while(cols.length<8){const d=new Date(cols[cols.length-1]);d.setDate(d.getDate()+st);cols.push(d);}
  return cols;
}

function dateX(s,cols){return((new Date(s)-new Date(cols[0]))/864e5/step())*cw();}
function durW(s,e){return Math.max(28,((new Date(e)-new Date(s))/864e5+1)/step()*cw());}

function renderTimeline(ev,cols){
  const w=cw(),td=tod();
  // months
  const gs=[];let g=null;
  cols.forEach(d=>{
    const k=d.getFullYear()+'-'+d.getMonth();
    if(!g||g.k!==k){g={k,l:MTH[d.getMonth()]+' '+d.getFullYear(),n:0};gs.push(g);}g.n++;
  });
  document.getElementById('tl-months').innerHTML=
    gs.map(g=>`<div class="tl-month" style="width:${g.n*w}px">${g.l}</div>`).join('');

  document.getElementById('tl-days').innerHTML=cols.map(d=>{
    const iso=d.toISOString().slice(0,10);
    const l=S.view==='month'?d.getDate()+'–'+(new Date(d.getTime()+6*864e5).getDate())
            :S.view==='week'?DAY_TH[d.getDay()]+' '+d.getDate():d.getDate()+'';
    return`<div class="tl-day${iso===td?' today':''}" style="width:${w}px">${l}</div>`;
  }).join('');
}

function renderDepts(ev){
  document.getElementById('dept-rows').innerHTML=ev.departments.map(d=>`
    <div class="dept-row">
      <div class="dept-color" style="background:${d.color}"></div>
      <div class="dept-name" ondblclick="Dept.rename('${d.id}')">${d.name}</div>
      <div class="dept-actions">
        <button class="dept-act" onclick="Dept.move('${d.id}',-1)">↑</button>
        <button class="dept-act" onclick="Dept.move('${d.id}',1)">↓</button>
        <button class="dept-act" onclick="Dept.remove('${d.id}')" style="color:var(--red)">✕</button>
      </div>
    </div>`).join('');
}

function renderTasks(ev,cols){
  const RH=72;
  const filter=S.filter||'all';
  document.getElementById('task-rows').innerHTML=ev.departments.map(d=>{
    const tasks=ev.tasks.filter(t=>t.dept===d.id&&(filter==='all'||t.status===filter));
    const bars=tasks.map(t=>{
      const x=Math.max(0,dateX(t.start,cols));
      const w=durW(t.start,t.end);
      const isDone=t.status==='done';
      const bg=t.ms?'':`${d.color}`;
      const alpha=isDone?'80':'cc';
      return`<div class="tbar${t.ms?' milestone':''}${isDone?' tbar-done':''}"
        style="left:${x}px;width:${w}px;${t.ms?'':'background:'+bg+alpha+';border-color:'+bg+'40;'}"
        onmouseenter="TT.show(event,'${t.id}')" onmouseleave="TT.hide()"
        onclick="Task.openEdit('${t.id}')">
        ${t.name}
        <div class="tbar-prog" style="width:${t.progress||0}%"></div>
      </div>`;
    }).join('');
    return`<div class="task-row" style="height:${RH}px">${bars}</div>`;
  }).join('');

  // today line
  const tx=dateX(tod(),cols);
  const old=document.querySelector('.today-line');if(old)old.remove();
  if(tx>=0){
    const line=document.createElement('div');
    line.className='today-line';
    line.style.cssText=`left:${tx}px;height:${ev.departments.length*RH}px`;
    document.getElementById('task-rows').appendChild(line);
  }
}

function renderArrows(ev,cols){
  const svg=document.getElementById('asvg');
  Array.from(svg.querySelectorAll('path')).forEach(p=>p.remove());
  const SBW=200,HDR=88,RH=72;
  ev.tasks.forEach(t=>{
    if(!t.dnext)return;
    const nx=ev.tasks.find(x=>x.id===t.dnext);if(!nx)return;
    const fi=ev.departments.findIndex(d=>d.id===t.dept);
    const ti=ev.departments.findIndex(d=>d.id===nx.dept);
    if(fi<0||ti<0)return;
    const x1=SBW+dateX(t.start,cols)+durW(t.start,t.end);
    const y1=HDR+fi*RH+RH/2;
    const x2=SBW+Math.max(0,dateX(nx.start,cols));
    const y2=HDR+ti*RH+RH/2;
    const mx=(x1+x2)/2;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('class','dep-path');
    p.setAttribute('d',`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    svg.appendChild(p);
  });
}

function renderAll(){
  const ev=curEv();
  const isEmpty=!ev;
  document.getElementById('canvas-empty').style.display=isEmpty?'flex':'none';
  document.getElementById('flowchart').style.display=isEmpty?'none':'block';

  // update counts
  const cnt=ev?.tasks?.length||0;
  document.getElementById('tc-chart').textContent=cnt;
  document.getElementById('tc-list').textContent=cnt;

  if(!ev){
    document.getElementById('ev-name').textContent='เลือกโปรเจกต์';
    document.getElementById('ev-range').textContent='';
    return;
  }
  document.getElementById('ev-name').textContent=ev.name;
  document.getElementById('ev-range').textContent=ev.startDate+' → '+ev.endDate;

  const cols=buildCols(ev);
  renderTimeline(ev,cols);
  renderDepts(ev);
  renderTasks(ev,cols);

  const SBW=200,HDR=88,RH=72;
  const W=SBW+cols.length*cw()+80;
  const H=HDR+ev.departments.length*RH+40;
  const fc=document.getElementById('flowchart');
  fc.style.width=W+'px'; fc.style.height=H+'px';
  const svg=document.getElementById('asvg');
  svg.setAttribute('width',W); svg.setAttribute('height',H);
  renderArrows(ev,cols);
  Canvas.apply();
}

const Canvas={
  _p:false,_sx:0,_sy:0,_ox:0,_oy:0,
  apply(){
    document.getElementById('flowchart').style.transform=`scale(${S.zoom}) translate(${S.px}px,${S.py}px)`;
    document.getElementById('zoom-val').textContent=Math.round(S.zoom*100)+'%';
  },
  zoom(d){S.zoom=Math.min(2.5,Math.max(.2,S.zoom+d));this.apply();},
  reset(){S.zoom=1;S.px=0;S.py=0;this.apply();},
  setup(){
    const wrap=document.getElementById('canvas-view');
    const fc=document.getElementById('flowchart');
    wrap.addEventListener('mousedown',e=>{
      if(e.target.closest('.tbar,.dept-row,.dept-act,.dept-add-row'))return;
      this._p=true;this._sx=e.clientX;this._sy=e.clientY;this._ox=S.px;this._oy=S.py;
      fc.classList.add('grabbing');
    });
    wrap.addEventListener('mousemove',e=>{
      if(!this._p)return;
      S.px=this._ox+(e.clientX-this._sx)/S.zoom;
      S.py=this._oy+(e.clientY-this._sy)/S.zoom;
      this.apply();
    });
    const stop=()=>{this._p=false;fc.classList.remove('grabbing');};
    wrap.addEventListener('mouseup',stop);
    wrap.addEventListener('mouseleave',stop);
    wrap.addEventListener('wheel',e=>{e.preventDefault();this.zoom(e.deltaY<0?.07:-.07);},{passive:false});
  }
};

      <div class="tt-row"><span class="tt-k">End</span><span class="tt-v" style="font-family:var(--mono)">${t.end}</span></div>

  },

              <span class="lv-task-name">${t.name}</span>
              ${t.dprev||t.dnext?`<span style="font-size:9px;color:var(--c6)">⤷</span>`:''}
            </div>
            <div class="lv-dept-tag">
              <span class="lv-dept-dot" style="background:${dc}"></span>${d?.name||'—'}
            </div>
          </div>
        </div>
        <div>
          <span class="lv-status-tag ${t.status==='todo'?'s-todo':t.status==='doing'?'s-doing':'s-done'}">

          </span>
        </div>
        <div style="text-align:center">
          ${ddStr?`<span class="doff-tag">${ddStr}</span>`:'—'}
          ${t.ms?`<button class="dday-shift-btn" onclick="event.stopPropagation();Resched.open('${t.id}')">◆ Reschedule</button>`:''}
        </div>
        <div class="lv-dates">${t.start}<br>${t.end}</div>
        <div class="lv-prog-wrap">

// ══════════════════════════════════════════════
//  RESCHEDULE
// ══════════════════════════════════════════════
const Resched={
  _aid:null,_orig:null,_new:null,_shift:0,_chk:{},
  open(anchorId){
    const ev=curEv();if(!ev)return;
    const anchor=ev.tasks.find(t=>t.id===anchorId);if(!anchor)return;
    this._aid=anchorId;this._orig=anchor.start;this._new=anchor.start;this._shift=0;
    this._chk={};
    ev.tasks.forEach(t=>{if(t.id!==anchorId)this._chk[t.id]=true;});
    this._render();
    document.getElementById('ov-resched').classList.add('open');
  },
  _shifted(d){const dt=new Date(d);dt.setDate(dt.getDate()+this._shift);return dt.toISOString().slice(0,10);},
  _render(){
    const ev=curEv();if(!ev)return;
    const anchor=ev.tasks.find(t=>t.id===this._aid);if(!anchor)return;
    const shiftTag=this._shift===0
      ?`<span class="rs-shift-tag" style="background:var(--c3);color:var(--c6)">No change</span>`
      :this._shift>0
        ?`<span class="rs-shift-tag" style="background:var(--amber-bg);color:var(--amber)">+${this._shift}d later</span>`
        :`<span class="rs-shift-tag" style="background:var(--green-bg);color:var(--green)">${this._shift}d earlier</span>`;
    document.getElementById('rs-anchor').innerHTML=`
      <div>
        <div class="rs-label">Milestone</div>
        <div class="rs-val">◆ ${anchor.name}</div>
      </div>
      <div>
        <div class="rs-label">Original date</div>
        <div class="rs-val" style="font-family:var(--mono)">${this._orig}</div>
      </div>
      <div>
        <div class="rs-label">New date</div>
        <input type="date" class="rs-date-input" id="rs-newdate" value="${this._new}" onchange="Resched.changeDate(this.value)">
      </div>
      <div>${shiftTag}</div>`;
    this._renderList();
  },
  changeDate(v){
    this._new=v;
    this._shift=Math.round((new Date(v)-new Date(this._orig))/864e5);
    this._render();
  },
  _renderList(){
    const ev=curEv();if(!ev)return;
    const others=[...ev.tasks].filter(t=>t.id!==this._aid).sort((a,b)=>new Date(a.start)-new Date(b.start));
    let h='';
    others.forEach(t=>{
      const chk=this._chk[t.id]!==false;
      const d=ev.departments.find(x=>x.id===t.dept);
      const ns=this._shift&&chk?this._shifted(t.start):null;
      const ne=this._shift&&chk?this._shifted(t.end):null;
      h+=`<div class="rs-row${chk?' checked':''}" onclick="Resched.toggle('${t.id}')">
        <input type="checkbox" class="rs-chk" ${chk?'checked':''} onclick="event.stopPropagation();Resched.toggle('${t.id}')">
        <div style="flex:1;min-width:0">
          <div class="rs-task-name">${t.ms?'◆ ':''}${t.name}</div>
          <div class="rs-task-dept">${d?.name||''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="rs-old-date">${t.start} → ${t.end}</div>
          ${ns?`<div class="rs-new-date">→ ${ns} / ${ne}</div>`
              :`<div class="rs-no-change">unchanged</div>`}
        </div>
      </div>`;
    });
    document.getElementById('rs-list').innerHTML=h||'<p style="padding:12px;font-size:12px;color:var(--c6)">No other tasks</p>';
  },
  toggle(id){this._chk[id]=!this._chk[id];this._renderList();},
  toggleAll(v){const ev=curEv();if(!ev)return;ev.tasks.forEach(t=>{if(t.id!==this._aid)this._chk[t.id]=v;});this._renderList();},
  apply(){
    const ev=curEv();if(!ev)return;
    const anchor=ev.tasks.find(t=>t.id===this._aid);
    if(anchor){
      const dur=Math.round((new Date(anchor.end)-new Date(anchor.start))/864e5);
      anchor.start=this._new;
      const ne=new Date(this._new);ne.setDate(ne.getDate()+dur);
      anchor.end=ne.toISOString().slice(0,10);
    }
    if(this._shift!==0){
      ev.tasks.forEach(t=>{
        if(t.id===this._aid||!this._chk[t.id])return;
        t.start=this._shifted(t.start);t.end=this._shifted(t.end);
      });
    }
    const all=ev.tasks.flatMap(t=>[new Date(t.start),new Date(t.end)]);
    ev.startDate=new Date(Math.min(...all)).toISOString().slice(0,10);
    ev.endDate=new Date(Math.max(...all)).toISOString().slice(0,10);
    addLog(`Rescheduled "${anchor?.name}" by ${this._shift>=0?'+':''}${this._shift}d`);
    save();this.close();renderAll();
    if(S.tab==='list')ListView.render();
  },
  close(){document.getElementById('ov-resched').classList.remove('open');}
};

// ══════════════════════════════════════════════
//  RIGHT PANEL
// ══════════════════════════════════════════════
function renderPanel(){
  const el=document.getElementById('rp-body');
  const title=document.getElementById('rp-title');
  if(S.rp==='log'){
    title.textContent='Activity log';
    el.innerHTML=S.logs.length
      ?S.logs.map(l=>`<div class="log-entry"><div class="log-time">${l.t}</div><div class="log-msg">${l.m}</div></div>`).join('')
      :'<p style="font-size:12px;color:var(--c6);padding:4px">No activity yet.</p>';
  }else if(S.rp==='team'){
    title.textContent='Team members';
    const members=[
      ['SM','#4f6ef7','สมชาย ใจดี','admin','Admin'],
      ['สR','#22c55e','สุมาลี รักงาน','staff','Staff'],
      ['VD','#a855f7','วิชัย ดูดี','viewer','Viewer']
    ];
    el.innerHTML=members.map(([a,c,n,r,lb])=>`
      <div class="member-row">
        <div class="avatar" style="background:${c}">${a}</div>
        <div>
          <div class="member-name">${n}</div>
          <span class="role-tag role-${r}">${lb}</span>
        </div>
      </div>`).join('')+
      `<div style="margin-top:12px"><button class="btn" style="width:100%;justify-content:center">+ Invite member</button></div>`;
  }
}

// ══════════════════════════════════════════════
//  UI CONTROLLER
// ══════════════════════════════════════════════
const UI={
  openProjects(){Proj.render();document.getElementById('ov-proj').classList.add('open');},
  closeProjects(){document.getElementById('ov-proj').classList.remove('open');},
  // เพิ่มฟังก์ชันนี้เข้าไป
  toggleTheme(){
    document.body.classList.toggle('light-mode');
    const isLight = document.body.classList.contains('light-mode');
    localStorage.setItem('ef_theme', isLight ? 'light' : 'dark');
  },
  setView(v){
    S.view=v;
    document.querySelectorAll('.seg-btn').forEach((b,i)=>b.classList.toggle('on',['month','week','day'][i]===v));
    renderAll();
  },
  togglePanel(type){
    const rp=document.getElementById('rpanel');
    if(!type||S.rp===type){rp.classList.remove('open');S.rp=null;}
    else{S.rp=type;rp.classList.add('open');renderPanel();}
  },
  switchTab(tab){
    S.tab=tab;
    document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('on',['chart','list'][i]===tab));
    const cv=document.getElementById('canvas-view');
    const lv=document.getElementById('list-view');
    const tb=document.getElementById('toolbar');
    if(tab==='chart'){
      cv.style.display='';lv.classList.remove('show');
      tb.style.display='';
    }else{
      cv.style.display='none';lv.classList.add('show');
      tb.style.display='';
      ListView.render();
    }
  },
  filterStatus(btn,val){
    S.filter=val;
    document.querySelectorAll('#filter-status .btn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    renderAll();
    if(S.tab==='list')ListView.render();
  },
  async rolePicker(){
    const r=await Dlg.input('Select role (1=Admin, 2=Staff, 3=Viewer)','','1');
    if(!r)return;
    const m=[{l:'Admin',c:'role-admin'},{l:'Staff',c:'role-staff'},{l:'Viewer',c:'role-viewer'}];
    const rd=m[Math.min(2,Math.max(0,parseInt(r)-1))];
    const ch=document.getElementById('role-chip');
    ch.textContent=rd.l; ch.className='role-chip '+rd.c;
  },
  exportNote(){alert('Export\n\nในการ deploy จริงจะใช้ html2canvas + jsPDF\nเพื่อ export flowchart ทั้งหมดพร้อม Thai font');}
};

// ══════════════════════════════════════════════
//  KEYBOARD & OVERLAY CLOSE
// ══════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    Task.close();UI.closeProjects();Dlg.cancelInput();Dlg.cancelConfirm();Resched.close();
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();Task.openAdd();}
  if((e.ctrlKey||e.metaKey)&&e.key==='='){e.preventDefault();Canvas.zoom(.1);}
  if((e.ctrlKey||e.metaKey)&&e.key==='-'){e.preventDefault();Canvas.zoom(-.1);}
});
['ov-proj','ov-task','ov-input','ov-confirm','ov-resched'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{
    if(e.target!==e.currentTarget)return;
    if(id==='ov-proj')UI.closeProjects();
    else if(id==='ov-task')Task.close();
    else if(id==='ov-input')Dlg.cancelInput();
    else if(id==='ov-confirm')Dlg.cancelConfirm();
    else if(id==='ov-resched')Resched.close();
  });
});

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
Canvas.setup();
S.tab=S.tab||'chart';

// ถ้าโหลดจาก Firebase เสร็จ ข้อมูลจะอัปเดตผ่าน load() เอง
// แต่เรนเดอร์เปล่าๆ ไว้รอก่อน
renderAll();
if(S.tab==='list')UI.switchTab('list');
if(!S.cur&&S.events.length===0)setTimeout(()=>UI.openProjects(),200);

</script>
